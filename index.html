<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lachlan's Coding Challenges</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <header class="site-header">
    <p class="header-eyebrow">Lachlan Dauth &mdash; Projects</p>
    <h1 class="header-title">CODING<br><em>CHALLENGES</em></h1>
    <div class="header-meta">
      <span class="header-meta-item">4 projects</span>
      <span class="header-meta-sep"></span>
      <span class="header-meta-item">Games &middot; Simulations &middot; Theory</span>
      <span class="header-meta-sep"></span>
      <span class="header-meta-item">Select to explore</span>
    </div>
  </header>

  <ul class="challenges-list" id="list"></ul>

  <footer class="site-footer">
    <span class="footer-label">Lachlan Dauth</span>
    <span class="footer-label" id="year-label"></span>
  </footer>

  <script>
    const ITEMS = [
      {
        title:  "Tic Tac Toe",
        tag:    "Game · AI · 2P",
        desc:   "Four variants on the classic 3×3 grid — a perfect minimax AI, an easy one-ply opponent, a handicapped baby-mode, and a local two-player mode. Pick your difficulty.",
        chips:  ["minimax", "adversarial search", "difficulty scaling", "local multiplayer"],
        href:   "./tic-tac-toe/index.html",
      },
      {
        title:  "Boids",
        tag:    "Simulation",
        desc:   "Craig Reynolds' classic emergent flocking algorithm from 1987. Three local forces — separation, alignment, cohesion — produce complex collective motion from zero central coordination.",
        chips:  ["emergent behaviour", "swarm intelligence", "Reynolds 1987", "canvas"],
        href:   "./boids/index.html",
      },
      {
        title:  "Turing Machine Simulator",
        tag:    "Theory",
        desc:   "Write transition rules in a plain-text format, load a tape, and step through the universal model of computation one rule at a time. Includes breakpoints and a pattern-based automated test suite.",
        chips:  ["computability theory", "transition rules", "tape automata", "test suite"],
        href:   "./turing-simulation/index.html",
      },
      {
        title:  "Automata Studio",
        tag:    "Theory · Simulation",
        desc:   "Build and simulate DFAs, NFAs, GNFAs, PDAs, Turing Machines, and CFGs in the browser. Convert between representations — NFA→DFA, DFA minimisation, GNFA→regex, regex→NFA, and CFG→CNF — with step-by-step visualisation and LaTeX export.",
        chips:  ["COMP4141", "finite automata", "pushdown automata", "Turing machines", "formal languages"],
        href:   "./automata-studio/index.html",
      },
    ];

    const ARROW = `<svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    const PLUS = `<svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`;

    const list = document.getElementById('list');

    ITEMS.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'c-item';
      li.setAttribute('role', 'button');
      li.setAttribute('aria-expanded', 'false');
      li.setAttribute('tabindex', '0');

      const num = String(i + 1).padStart(2, '0');

      li.innerHTML = `
        <div class="c-header">
          <span class="c-num">${num}</span>
          <span class="c-title">${item.title}</span>
          <span class="c-tag">${item.tag}</span>
          <span class="c-arrow">${PLUS}</span>
        </div>
        <div class="c-body" role="region">
          <div class="c-body-inner">
            <div class="c-body-content">
              <div class="c-desc">
                <p>${item.desc}</p>
                <div class="c-chips">
                  ${item.chips.map(c => `<span class="c-chip">${c}</span>`).join('')}
                </div>
              </div>
              <a class="c-launch" href="${item.href}">
                Launch ${ARROW}
              </a>
            </div>
          </div>
        </div>
      `;

      // toggle
      const header = li.querySelector('.c-header');
      const body   = li.querySelector('.c-body');

      function toggle() {
        const isOpen = li.classList.contains('open');

        // close all others
        document.querySelectorAll('.c-item.open').forEach(el => {
          el.classList.remove('open');
          el.querySelector('.c-body').classList.remove('open');
          el.setAttribute('aria-expanded', 'false');
        });

        if (!isOpen) {
          li.classList.add('open');
          body.classList.add('open');
          li.setAttribute('aria-expanded', 'true');
        }
      }

      header.addEventListener('click', toggle);
      li.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });

      // stop launch link from toggling closed
      li.querySelector('.c-launch').addEventListener('click', e => e.stopPropagation());

      list.appendChild(li);
    });

    // year
    document.getElementById('year-label').textContent = new Date().getFullYear();
  </script>

</body>
</html>
